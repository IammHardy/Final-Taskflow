default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: localhost
  username: yusuf
  password: yusuf123

development:
  primary:
    <<: *default
    database: taskflow_development

  queue:
    <<: *default
    database: taskflow_development_queue
    migrations_paths: db/queue_migrate

test:
  primary:
    <<: *default
    database: taskflow_test

  queue:
    <<: *default
    database: taskflow_test_queue
    migrations_paths: db/queue_migrate

production:
  primary: &primary_production
    <<: *default
    database: taskflow_production
    username: taskflow
    password: <%= ENV["TASKFLOW_DATABASE_PASSWORD"] %>

  cache:
    <<: *primary_production
    database: taskflow_production_cache
    migrations_paths: db/cache_migrate

  queue:
    <<: *primary_production
    database: taskflow_production_queue
    migrations_paths: db/queue_migrate

  cable:
    <<: *primary_production
    database: taskflow_production_cable
    migrations_paths: db/cable_migrate